<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المهنيين 🗺️ | خدمتك عنا</title>
    
    <!-- Leaflet CSS for OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Glassmorphism Overlays */
        .map-overlay {
            position: absolute;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 15px;
            transition: all 0.3s ease;
        }

        /* Top Bar */
        .top-bar {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            white-space: nowrap;
        }

        .search-container {
            flex: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            padding-right: 45px;
            border-radius: 15px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 15px rgba(118, 75, 162, 0.2);
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            max-width: 100%;
        }

        .filter-btn {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-size: 14px;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
            border-color: transparent;
        }

        /* Bottom Control */
        .bottom-control {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .nearby-btn {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .nearby-btn:hover {
            transform: scale(1.05);
        }

        /* Leaflet Popup Styling Customization */
        .custom-popup .leaflet-popup-content-wrapper {
            padding: 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .custom-popup .leaflet-popup-content {
            margin: 0;
            width: 280px !important;
            direction: rtl;
        }
        
        .custom-popup .leaflet-popup-close-button {
            color: white !important;
            z-index: 10;
            top: 10px !important;
            right: auto !important;
            left: 10px !important;
            background: rgba(0,0,0,0.2) !important;
            border-radius: 50%;
            width: 24px !important;
            height: 24px !important;
            line-height: 24px !important;
            text-align: center;
        }

        .active-window {
            width: 100%;
        }

        .window-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 15px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-right: 20px;
        }

        .window-avatar {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #764ba2;
            font-weight: bold;
            flex-shrink: 0;
        }

        .window-info {
            flex: 1;
        }

        .window-title {
            font-weight: bold;
            font-size: 16px;
        }

        .window-job {
            font-size: 13px;
            opacity: 0.9;
        }

        .window-body {
            padding: 15px;
        }

        .window-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }

        .window-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .window-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .btn-green {
            background: #27ae60;
        }

        .btn-blue {
            background: #3498db;
        }

        @media (max-width: 768px) {
            .top-bar {
                flex-direction: column;
                align-items: stretch;
                top: 10px;
                padding: 10px;
            }

            .back-btn span {
                display: none;
            }

            .back-btn::after {
                content: '🏠';
            }

            .back-btn {
                width: 40px;
                padding: 0;
                justify-content: center;
                height: 40px;
                position: absolute;
                left: 10px;
                top: 10px;
                z-index: 100;
            }

            .search-container {
                margin-left: 50px;
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <!-- Loading Screen -->
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <h3>جاري تحميل الخريطة...</h3>
    </div>

    <!-- UI Overlay: Top -->
    <div class="map-overlay top-bar">
        <a href="index.html" class="back-btn">
            <span>🏠 العودة</span>
        </a>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="mapSearch" class="search-input" placeholder="ابحث عن مهني أو خدمة...">
        </div>

        <div class="filter-group" id="mapFilters">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="carpenter">نجارة</button>
            <button class="filter-btn" data-filter="plumber">سباكة</button>
            <button class="filter-btn" data-filter="electrician">كهرباء</button>
            <button class="filter-btn" data-filter="cleaning">تنظيف</button>
        </div>
    </div>

    <!-- UI Overlay: Bottom -->
    <div class="map-overlay bottom-control">
        <button class="nearby-btn" onclick="findNearby()">
            <span>📍</span>
            ابحث بالقرب مني
        </button>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Firebase Config -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyCj5YjdiruBTCfxDnxlDd4W6YA5iCWRfE4",
            authDomain: "home-services-app-a9c5e.firebaseapp.com",
            projectId: "home-services-app-a9c5e",
            storageBucket: "home-services-app-a9c5e.appspot.com",
            messagingSenderId: "287028219636",
            appId: "1:287028219636:web:2ad4b0e092a2c007e318a1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global Variables
        window.map = null;
        window.markers = [];
        window.professionals = [];
        window.userLocation = { lat: 31.9539, lng: 35.9106 }; // Default: Amman

        // Initialize Map
        function initMap() {
            // Create Leaflet map
            window.map = L.map('map', {
                zoomControl: false // We'll position it manually
            }).setView([window.userLocation.lat, window.userLocation.lng], 13);
            
            // Move zoom control to bottom right so it doesn't overlap with our top UI
            L.control.zoom({ position: 'bottomright' }).addTo(window.map);

            // Add OpenStreetMap tiles (Free & No API Key required!)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19
            }).addTo(window.map);

            // Add Markers safely
            window.professionals.forEach(prof => {
                try {
                    addMarker(prof);
                } catch(e) {
                    console.error('Error adding marker:', e, prof);
                }
            });

            // Hide Loading Screen
            const loadingEl = document.getElementById('loading');
            if(loadingEl) loadingEl.style.display = 'none';
        }

        // Load Professionals from Firebase
        async function loadMapData() {
            try {
                // محاولة القراءة من الكاش أولاً للسرعة
                const cached = localStorage.getItem('cachedProfessionals');
                let rawData = [];
                
                if (cached) {
                    rawData = JSON.parse(cached);
                } else {
                    const snapshot = await getDocs(collection(db, 'approvedUsers'));
                    rawData = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
                }

                window.professionals = rawData.map(data => {
                    // Mock Location if missing (Randomize around Amman for demo purposes)
                    let finalLat = 31.9539 + (Math.random() - 0.5) * 0.1;
                    let finalLng = 35.9106 + (Math.random() - 0.5) * 0.1;
                    
                    if (data.latitude !== undefined && data.latitude !== null && data.latitude !== '' && data.latitude !== 'غير محدد') {
                        const parsedLat = parseFloat(data.latitude);
                        if (!isNaN(parsedLat)) finalLat = parsedLat;
                    }
                    if (data.longitude !== undefined && data.longitude !== null && data.longitude !== '' && data.longitude !== 'غير محدد') {
                        const parsedLng = parseFloat(data.longitude);
                        if (!isNaN(parsedLng)) finalLng = parsedLng;
                    }

                    return {
                        ...data,
                        location: {
                            lat: finalLat,
                            lng: finalLng
                        }
                    };
                });

                initMap();
            } catch (error) {
                console.error("Error loading map data:", error);
                const loadingEl = document.getElementById('loading');
                if(loadingEl) {
                    loadingEl.innerHTML = `<h3>⚠️ خطأ في تحميل البيانات</h3><button onclick="location.reload()" style="margin-top:10px;padding:8px 15px;cursor:pointer;">إعادة المحاولة</button>`;
                }
            }
        }

        // Add Marker
        function addMarker(prof) {
            if(!prof || !prof.name || prof.name === 'غير محدد') return;

            const isAvailable = prof.status === 'available';
            const pinColor = isAvailable ? "#2ecc71" : "#e74c3c"; // Green or Red

            // Custom Leaflet DivIcon - single line to avoid parsing issues
            const markerHtmlStyles = `background-color: ${pinColor}; width: 20px; height: 20px; display: block; left: -10px; top: -10px; position: relative; border-radius: 50%; border: 3px solid #FFFFFF; box-shadow: 0 2px 5px rgba(0,0,0,0.5);`;

            const customIcon = L.divIcon({
              className: "my-custom-pin",
              iconAnchor: [0, 10],
              popupAnchor: [0, -10],
              html: `<span style="${markerHtmlStyles}"></span>`
            });

            if (isNaN(prof.location.lat) || isNaN(prof.location.lng)) return;

            const marker = L.marker([prof.location.lat, prof.location.lng], { icon: customIcon }).addTo(window.map);

            // Info Window Content
            const contentString = `
                <div class="active-window">
                    <div class="window-header">
                        <div class="window-avatar">${prof.name.charAt(0).toUpperCase()}</div>
                        <div class="window-info">
                            <div class="window-title">${prof.name}</div>
                            <div class="window-job">${prof.job || 'مهني'} | ${prof.city || ''}</div>
                        </div>
                    </div>
                    <div class="window-body">
                        <div class="window-stat">
                            <span>💰 السعر</span>
                            <span>${prof.hourlyPrice ? prof.hourlyPrice + ' د.أ / ساعة' : 'غير محدد'}</span>
                        </div>
                        <div class="window-stat">
                            <span>📅 الحالة</span>
                            <span style="color: ${isAvailable ? '#2ecc71' : '#e74c3c'}">${isAvailable ? 'متاح الآن' : 'مشغول'}</span>
                        </div>
                        
                        <div class="window-actions">
                            <a href="tel:${prof.phone}" class="window-btn btn-green">📞 اتصال</a>
                            <a href="index.html" class="window-btn btn-blue">👤 الملف</a>
                        </div>
                    </div>
                </div>
            `;

            marker.bindPopup(contentString, {
                className: 'custom-popup'
            });

            // Store marker for filtering
            window.markers.push({
                marker,
                category: prof.job || '',
                name: prof.name
            });
        }

        // Search Near Me (Geolocation)
        window.findNearby = function () {
            const btn = document.querySelector('.nearby-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'جاري التحديد...';

            window.map.locate({setView: true, maxZoom: 15});

            window.map.once('locationfound', function(e) {
                // User Marker
                L.marker(e.latlng, {
                    icon: L.divIcon({
                        className: "user-pin",
                        iconAnchor: [0, 8],
                        html: '<span style="background-color: #3498db; width: 16px; height: 16px; display: block; left: -8px; top: -8px; position: relative; border-radius: 50%; border: 3px solid #FFFFFF; box-shadow: 0 0 10px rgba(52, 152, 219, 0.8);"></span>'
                    })
                }).addTo(window.map).bindPopup("📍 موقعك الحالي").openPopup();

                btn.innerHTML = '✅ تم التحديد';
                setTimeout(() => btn.innerHTML = originalText, 2000);
            });

            window.map.once('locationerror', function(e) {
                alert("تعذر تحديد موقعك. يرجى تفعيل الـ GPS في متصفحك.");
                console.error('GPS Error', e);
                btn.innerHTML = originalText;
            });
        };

        // Filtering Logic
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // UI Toggle
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');

                const filter = e.target.dataset.filter;
                const search = document.getElementById('mapSearch').value.toLowerCase();

                filterMarkers(filter, search);
            });
        });

        // Search Logic
        document.getElementById('mapSearch').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const filter = document.querySelector('.filter-btn.active').dataset.filter;
            filterMarkers(filter, search);
        });

        function filterMarkers(category, searchText) {
            window.markers.forEach(item => {
                let matchCategory = category === 'all' || mapCategory(item.category) === category;
                let matchSearch = item.name.toLowerCase().includes(searchText);

                if (matchCategory && matchSearch) {
                    // Add back to map if not present
                    if (!window.map.hasLayer(item.marker)) {
                        item.marker.addTo(window.map);
                    }
                } else {
                    // Remove from map
                    if (window.map.hasLayer(item.marker)) {
                        item.marker.remove();
                    }
                }
            });
        }

        // Helper to map Arabic View Types to English filters
        function mapCategory(arabicJob) {
            if (!arabicJob) return 'other';
            if (arabicJob.includes('نجار')) return 'carpenter';
            if (arabicJob.includes('سباك') || arabicJob.includes('مواسرجي')) return 'plumber';
            if (arabicJob.includes('كهرب')) return 'electrician';
            if (arabicJob.includes('تنظيف')) return 'cleaning';
            return 'other';
        }

        // Initialize Load
        loadMapData();

    </script>
</body>
</html>
